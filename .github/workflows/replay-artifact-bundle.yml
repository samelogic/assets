name: Replay Artifact Bundle\n\non:\n  workflow_dispatch:\n    inputs:\n      base_url:\n        description: "App base URL (for example https://samelogic.com)"\n        required: true\n        type: string\n      project_id:\n        description: "Project ID containing the replay"\n        required: true\n        type: string\n      replay_id:\n        description: "Replay ID to export"\n        required: true\n        type: string\n      run_id:\n        description: "Samelogic CI run ID"\n        required: true\n        type: string\n      profile:\n        description: "Run profile (smoke, regression, auth)"\n        required: true\n        type: string\n      callback_url:\n        description: "Samelogic callback URL"\n        required: false\n        type: string\n      run_token:\n        description: "Optional per-run Samelogic token (enables secretless callbacks/artifacts)"\n        required: false\n        type: string\n      include_rrweb:\n        description: "Include logs/rrweb-events.json"\n        required: false\n        default: true\n        type: boolean\n      pr_number:\n        description: "Optional PR number to post pr-comment.md"\n        required: false\n        type: string\n\njobs:\n  bundle:\n    name: Generate Replay Artifact Bundle\n    runs-on: ubuntu-latest\n    permissions:\n      contents: read\n\n    steps:\n      - name: Check out code\n        uses: actions/checkout@v4\n\n      - name: Resolve callback endpoint\n        run: |\n          if [ -n "${{ inputs.callback_url }}" ]; then\n            echo "CALLBACK_URL=${{ inputs.callback_url }}" >> "$GITHUB_ENV"\n          else\n            echo "CALLBACK_URL=${{ inputs.base_url }}/api/integrations/github-actions/ci-runs/callback" >> "$GITHUB_ENV"\n          fi\n\n      - name: Resolve authentication material\n        env:\n          RUN_TOKEN: ${{ inputs.run_token }}\n          SERVICE_TOKEN: ${{ secrets.SAMELOGIC_CI_SERVICE_TOKEN || secrets.CI_RUNS_SERVICE_TOKEN || secrets.REPLAY_ARTIFACT_SESSION_TOKEN }}\n          CALLBACK_SECRET: ${{ secrets.SAMELOGIC_CI_CALLBACK_SECRET || secrets.CI_RUNS_CALLBACK_SECRET }}\n        run: |\n          EFFECTIVE_ARTIFACT_TOKEN="$RUN_TOKEN"\n          if [ -z "$EFFECTIVE_ARTIFACT_TOKEN" ]; then\n            EFFECTIVE_ARTIFACT_TOKEN="$SERVICE_TOKEN"\n          fi\n          if [ -z "$EFFECTIVE_ARTIFACT_TOKEN" ]; then\n            echo "Missing auth: provide inputs.run_token or SAMELOGIC_CI_SERVICE_TOKEN secret"\n            exit 1\n          fi\n\n          if [ -z "$RUN_TOKEN" ] && [ -z "$CALLBACK_SECRET" ]; then\n            echo "Missing callback auth: provide inputs.run_token or SAMELOGIC_CI_CALLBACK_SECRET secret"\n            exit 1\n          fi\n\n          echo "EFFECTIVE_ARTIFACT_TOKEN=$EFFECTIVE_ARTIFACT_TOKEN" >> "$GITHUB_ENV"\n\n      - name: Callback queued\n        env:\n          CALLBACK_SECRET: ${{ secrets.SAMELOGIC_CI_CALLBACK_SECRET || secrets.CI_RUNS_CALLBACK_SECRET }}\n          RUN_ID: ${{ inputs.run_id }}\n          RUN_TOKEN: ${{ inputs.run_token }}\n          PROFILE: ${{ inputs.profile }}\n        run: |\n          STATUS_PAYLOAD=$(cat <<JSON\n          {"runId":"$RUN_ID","status":"queued","conclusion":"","logsUrl":"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}","externalRunId":"gha_${GITHUB_RUN_ID}","failureSummary":"","profile":"$PROFILE"}\n          JSON\n          )\n\n          COMMON_HEADERS=(-H "Content-Type: application/json" -H "X-Run-Id: $RUN_ID")\n          if [ -n "$RUN_TOKEN" ]; then\n            COMMON_HEADERS+=(-H "X-Samelogic-Run-Token: $RUN_TOKEN")\n          fi\n          if [ -n "$CALLBACK_SECRET" ]; then\n            SIGNATURE="sha256=$(printf '%s' "$STATUS_PAYLOAD" | openssl dgst -sha256 -hmac "$CALLBACK_SECRET" | sed 's/^.* //')"\n            COMMON_HEADERS+=(-H "X-Samelogic-Signature: $SIGNATURE")\n          fi\n\n          curl -fsSL -X POST "${COMMON_HEADERS[@]}" -d "$STATUS_PAYLOAD" "$CALLBACK_URL"\n\n      - name: Callback running\n        env:\n          CALLBACK_SECRET: ${{ secrets.SAMELOGIC_CI_CALLBACK_SECRET || secrets.CI_RUNS_CALLBACK_SECRET }}\n          RUN_ID: ${{ inputs.run_id }}\n          RUN_TOKEN: ${{ inputs.run_token }}\n          PROFILE: ${{ inputs.profile }}\n        run: |\n          STATUS_PAYLOAD=$(cat <<JSON\n          {"runId":"$RUN_ID","status":"running","conclusion":"","logsUrl":"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}","externalRunId":"gha_${GITHUB_RUN_ID}","failureSummary":"","profile":"$PROFILE","startedAt":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}\n          JSON\n          )\n\n          COMMON_HEADERS=(-H "Content-Type: application/json" -H "X-Run-Id: $RUN_ID")\n          if [ -n "$RUN_TOKEN" ]; then\n            COMMON_HEADERS+=(-H "X-Samelogic-Run-Token: $RUN_TOKEN")\n          fi\n          if [ -n "$CALLBACK_SECRET" ]; then\n            SIGNATURE="sha256=$(printf '%s' "$STATUS_PAYLOAD" | openssl dgst -sha256 -hmac "$CALLBACK_SECRET" | sed 's/^.* //')"\n            COMMON_HEADERS+=(-H "X-Samelogic-Signature: $SIGNATURE")\n          fi\n\n          curl -fsSL -X POST "${COMMON_HEADERS[@]}" -d "$STATUS_PAYLOAD" "$CALLBACK_URL"\n\n      - name: Download replay artifact bundle\n        env:\n          BASE_URL: ${{ inputs.base_url }}\n          PROJECT_ID: ${{ inputs.project_id }}\n          REPLAY_ID: ${{ inputs.replay_id }}\n          RUN_ID: ${{ inputs.run_id }}\n          INCLUDE_RRWEB: ${{ inputs.include_rrweb }}\n          EFFECTIVE_ARTIFACT_TOKEN: ${{ env.EFFECTIVE_ARTIFACT_TOKEN }}\n        run: |\n          if [ -z "$EFFECTIVE_ARTIFACT_TOKEN" ]; then\n            echo "Missing artifact auth token"\n            exit 1\n          fi\n\n          QUERY_PARAM="true"\n          if [ "$INCLUDE_RRWEB" = "false" ]; then\n            QUERY_PARAM="false"\n          fi\n\n          URL="${BASE_URL%/}/api/projects/${PROJECT_ID}/step-replays/${REPLAY_ID}/artifact-bundle?includeRrweb=${QUERY_PARAM}&runId=${RUN_ID}"\n          echo "Downloading bundle from: $URL"\n          curl -fSL \\n            -H "Authorization: Bearer ${EFFECTIVE_ARTIFACT_TOKEN}" \\n            "$URL" \\n            -o replay-artifact.zip\n\n      - name: Validate zip and extract PR comment\n        run: |\n          zipinfo -1 replay-artifact.zip > zip-entries.txt\n          ROOT_DIR=$(head -n 1 zip-entries.txt | cut -d/ -f1)\n          if [ -z "$ROOT_DIR" ]; then\n            echo "Unable to resolve bundle root directory from zip"\n            exit 1\n          fi\n\n          unzip -p replay-artifact.zip "$ROOT_DIR/pr-comment.md" > pr-comment.md\n          echo "Bundle root: $ROOT_DIR"\n          echo "--- PR Comment Preview ---"\n          cat pr-comment.md\n\n      - name: Upload replay artifact zip\n        uses: actions/upload-artifact@v4\n        with:\n          name: replay-artifact-bundle-${{ inputs.replay_id }}\n          path: |\n            replay-artifact.zip\n            zip-entries.txt\n            pr-comment.md\n\n      - name: Callback completed\n        if: ${{ always() }}\n        env:\n          CALLBACK_SECRET: ${{ secrets.SAMELOGIC_CI_CALLBACK_SECRET || secrets.CI_RUNS_CALLBACK_SECRET }}\n          RUN_ID: ${{ inputs.run_id }}\n          RUN_TOKEN: ${{ inputs.run_token }}\n          PROFILE: ${{ inputs.profile }}\n          JOB_STATUS: ${{ job.status }}\n        run: |\n          if [ "$JOB_STATUS" = "success" ]; then\n            CONCLUSION="success"\n            FAILURE_SUMMARY=""\n          elif [ "$JOB_STATUS" = "cancelled" ]; then\n            CONCLUSION="cancelled"\n            FAILURE_SUMMARY="CI job was cancelled."\n          else\n            CONCLUSION="failure"\n            FAILURE_SUMMARY="Replay artifact validation failed in CI."\n          fi\n\n          STATUS_PAYLOAD=$(cat <<JSON\n          {"runId":"$RUN_ID","status":"completed","conclusion":"$CONCLUSION","logsUrl":"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}","externalRunId":"gha_${GITHUB_RUN_ID}","failureClass":"runner_failed","failureSummary":"$FAILURE_SUMMARY","profile":"$PROFILE","completedAt":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}\n          JSON\n          )\n\n          COMMON_HEADERS=(-H "Content-Type: application/json" -H "X-Run-Id: $RUN_ID")\n          if [ -n "$RUN_TOKEN" ]; then\n            COMMON_HEADERS+=(-H "X-Samelogic-Run-Token: $RUN_TOKEN")\n          fi\n          if [ -n "$CALLBACK_SECRET" ]; then\n            SIGNATURE="sha256=$(printf '%s' "$STATUS_PAYLOAD" | openssl dgst -sha256 -hmac "$CALLBACK_SECRET" | sed 's/^.* //')"\n            COMMON_HEADERS+=(-H "X-Samelogic-Signature: $SIGNATURE")\n          fi\n\n          curl -fsSL -X POST "${COMMON_HEADERS[@]}" -d "$STATUS_PAYLOAD" "$CALLBACK_URL"\n